<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alle Locaties — De Wereld van de Goede Bijstand</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:       #0d1b2a;
      --sepia:     #2c4a6e;
      --paper:     #e8f0f7;
      --parchment: #d4e4f0;
      --cream:     #f0f6fb;
      --rule:      #7aaac8;
      --gold:      #3a7bbf;
    }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 17px;
      line-height: 1.7;
    }

    /* ── Language Switcher ── */
    .lang-bar {
      background: var(--ink);
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 0 20px;
      gap: 2px;
      border-bottom: 2px solid var(--gold);
      position: relative;
      z-index: 100;
    }

    .lang-label {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--rule);
      margin-right: 10px;
      padding: 10px 0;
      opacity: 0.7;
    }

    .lang-btn {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--rule);
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 10px 12px;
      border-bottom: 3px solid transparent;
      transition: color 0.18s, border-color 0.18s, background 0.18s;
      position: relative;
      top: 2px;
    }

    .lang-btn:hover {
      color: var(--paper);
      background: rgba(255,255,255,0.05);
    }

    .lang-btn.active {
      color: #fff;
      border-bottom-color: var(--gold);
    }

    /* ── Translation overlay ── */
    .translating-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(13,27,42,0.72);
      z-index: 999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 18px;
      backdrop-filter: blur(3px);
    }
    .translating-overlay.visible { display: flex; }

    .translating-spinner {
      width: 42px;
      height: 42px;
      border: 3px solid rgba(122,170,200,0.25);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .translating-text {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1rem;
      letter-spacing: 0.15em;
      color: var(--paper);
      text-transform: uppercase;
    }

    /* ── Header ── */
    header {
      background: var(--ink);
      color: var(--paper);
      text-align: center;
      padding: 36px 24px 28px;
      border-bottom: 4px solid var(--gold);
    }

    .header-kicker {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--rule);
      margin-bottom: 10px;
    }

    header h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(1.6rem, 5vw, 2.8rem);
      font-weight: 600;
      letter-spacing: 0.03em;
      line-height: 1.2;
      color: var(--paper);
      margin-bottom: 8px;
    }

    header p {
      font-family: 'EB Garamond', Georgia, serif;
      font-style: italic;
      font-size: 1rem;
      color: var(--rule);
    }

    .back-link {
      display: block;
      text-align: center;
      padding: 14px;
      background: var(--parchment);
      border-bottom: 1px solid var(--rule);
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--sepia);
      text-decoration: none;
    }
    .back-link:hover { background: var(--ink); color: var(--paper); }

    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 48px 24px 64px;
    }

    .continent-block { margin-bottom: 52px; }

    .continent-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--gold);
    }

    .continent-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 2px solid #fff;
      box-shadow: 0 0 0 1px var(--rule);
    }

    .continent-header h2 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: 0.03em;
      flex: 1;
    }

    .continent-count {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .location-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 0;
      border-top: 1px solid var(--rule);
      border-left: 1px solid var(--rule);
    }

    .location-item {
      padding: 9px 14px;
      border-right: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 0.95rem;
      color: var(--sepia);
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.15s;
    }

    .location-item:hover { background: var(--parchment); color: var(--ink); }

    .location-item::before {
      content: '·';
      color: var(--gold);
      font-size: 1.2rem;
      line-height: 1;
      flex-shrink: 0;
    }

    footer {
      background: var(--ink);
      color: var(--rule);
      text-align: center;
      padding: 24px;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 12px;
      letter-spacing: 0.12em;
    }

    @media (max-width: 480px) {
      .location-grid { grid-template-columns: 1fr 1fr; }
      .lang-label { display: none; }
      .lang-btn { padding: 10px 8px; font-size: 10px; }
    }
  </style>
</head>

  /* ── Translation cache & state ── */
  const translationCache = { nl: null }; // nl is native, no need to translate
  let currentLang = 'nl';

  const overlayMessages = {
    nl: 'Vertalen…', fr: 'Traduction…', de: 'Übersetzen…', en: 'Translating…', es: 'Traduciendo…'
  };

  /* ── Dutch (original) strings ── */
  const originalStrings = {
    kicker:   'Een pelgrimage in aarde',
    title:    'Alle Locaties',
    subtitle: '155 plekken op 6 continenten — de volledige collectie van de Goede Bijstand',
    back:     '← Terug naar de kaart',
    footer:   'Een project van de Goede Bijstand \u00a0·\u00a0 Bijstandsstraat 5, 1000 Brussel',
    locationsLabel: 'locaties',
    continents: {
      "Afrika":     "Afrika",
      "Azië & M-O": "Azië & M-O",
      "Europa":     "Europa",
      "Amerika":    "Amerika",
    },
    locationNames: locations.map(l => l.name),
  };

  /* ── Render locations ── */
  function renderLocations(strings) {
    const main = document.getElementById('locaties');
    main.innerHTML = '';

    // Group: use translated continent names but keep structure
    const continentKeys = ["Afrika", "Azië & M-O", "Europa", "Amerika"];

    continentKeys.forEach((key, ci) => {
      const translatedContinent = strings.continents[key] || key;
      const color = continentColors[key] || '#1565c0';
      const locs = locations
        .map((l, i) => ({ original: l, translatedName: strings.locationNames[i] }))
        .filter(item => item.original.continent === key);

      if (!locs.length) return;

      const block = document.createElement('div');
      block.className = 'continent-block';
      block.innerHTML = `
        <div class="continent-header">
          <span class="continent-dot" style="background:${color}"></span>
          <h2>${translatedContinent}</h2>
          <span class="continent-count">${locs.length} ${strings.locationsLabel}</span>
        </div>
        <div class="location-grid">
          ${locs.map(item => `<div class="location-item">${item.translatedName}</div>`).join('')}
        </div>
      `;
      main.appendChild(block);
    });
  }

  /* ── Apply UI strings ── */
  function applyStrings(strings) {
    document.getElementById('txt-kicker').textContent    = strings.kicker;
    document.getElementById('txt-title').textContent     = strings.title;
    document.getElementById('txt-subtitle').textContent  = strings.subtitle;
    document.getElementById('txt-back').textContent      = strings.back;
    document.getElementById('txt-footer').innerHTML      = strings.footer;
    renderLocations(strings);
  }

  /* ── Call Claude API for translation ── */
  async function translateTo(lang) {
    const langNames = { fr: 'French', de: 'German', en: 'English', es: 'Spanish' };
    const targetLang = langNames[lang];

    const payload = {
      kicker: originalStrings.kicker,
      title: originalStrings.title,
      subtitle: originalStrings.subtitle,
      back: originalStrings.back,
      footer: originalStrings.footer,
      locationsLabel: originalStrings.locationsLabel,
      continents: originalStrings.continents,
      locationNames: originalStrings.locationNames,
    };

    const prompt = `Translate the following JSON object from Dutch to ${targetLang}.

Rules:
- Translate all text values.
- For place names inside "locationNames" and "continents": translate country/region name portions that have conventional ${targetLang} equivalents (e.g. "Italië" → "Italy" in English, "Israël" → "Israel"). Keep proper city names unchanged.
- "locationsLabel" should be translated as the word for "locations" in ${targetLang}.
- Return ONLY valid JSON, no markdown, no explanation.

JSON:
${JSON.stringify(payload, null, 2)}`;

    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 4000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();
    const text = data.content.map(i => i.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    return JSON.parse(clean);
  }

  /* ── Language switch handler ── */
  async function switchLang(lang) {
    if (lang === currentLang) return;

    // Update active button
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.lang === lang);
    });

    if (lang === 'nl') {
      currentLang = 'nl';
      applyStrings(originalStrings);
      return;
    }

    // Show overlay
    const overlay = document.getElementById('overlay');
    document.getElementById('overlay-text').textContent = overlayMessages[lang] || 'Translating…';
    overlay.classList.add('visible');

    try {
      if (!translationCache[lang]) {
        translationCache[lang] = await translateTo(lang);
      }
      currentLang = lang;
      applyStrings(translationCache[lang]);
    } catch (err) {
      console.error('Translation error:', err);
      // Revert button on error
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === currentLang);
      });
      alert('Translation failed. Please try again.');
    } finally {
      overlay.classList.remove('visible');
    }
  }

  /* ── Init ── */
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => switchLang(btn.dataset.lang));
  });

  // Initial Dutch render
  applyStrings(originalStrings);
